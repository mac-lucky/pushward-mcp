        icon:
          type: string
        label:
          type: string
        max_value:
          format: double
          type: number
        min_value:
          format: double
          type: number
        secondary_url_action:
          $ref: "#/components/schemas/TapAction"
        severity:
          type: string
        stat_rows:
          items:
