            url:
              description: Target URL. Any scheme except javascript/data/file/vbscript. http(s) URLs require a host; custom schemes (e.g. youtube://, homeassistant://) open the matching app.
              maxLength: 2048
              type: string
          required:
            - url
          type: object
        snooze_seconds:
          description: How many seconds POST /activities/{slug}/snooze extends end_date, and the iOS AlarmKit postAlert (snooze) window. Defaults to 300 (5 min) when omitted. Only meaningful with alarm:true.
          maximum: 3600
          minimum: 60
          type: integer
        snoozed_until:
          description: Server-set unix timestamp marking the new end_date after the most recent snooze. Non-nil and >= now means the activity is currently snoozed.
          readOnly: true
          type: integer
        start_date:
          description: Unix timestamp when countdown began. Server preserves the stored value on partial updates that send end_date without start_date or duration.
          type: integer
        state:
          description: Short status text (e.g. Washing, Build Container Image).
          maxLength: 256
