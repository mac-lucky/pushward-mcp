        subtitle:
          type: string
        tap_action:
          $ref: "#/components/schemas/TapAction"
        template:
          description: Visual style of the widget.
          enum:
            - value
            - progress
            - status
            - gauge
            - stat_list
          examples:
            - progress
          type: string
        text_color:
          type: string
        trend:
          enum:
            - up
            - down
            - flat
          examples:
            - up
          type: string
        unit:
          type: string
        url_action:
          $ref: "#/components/schemas/TapAction"
        value:
          format: double
          type: number
      required:
        - template
      type: object
  securitySchemes:
    bearer:
      bearerFormat: token
      description: Integration key (hlk_ prefix)
      scheme: bearer
      type: http
info:
  description: |
    PushWard is an APNs gateway for iOS Live Activities.
    Start, update, and end Live Activities on any subscribed device with plain HTTP requests.

    ## Authentication

    All endpoints (except `/health`) require an integration key in the `Authorization` header:

    ```
    Authorization: Bearer hlk_aBcDeFgHiJkLmNoPqRsTuVwXyZ012345
    ```

    Integration keys are created in the PushWard iOS app and grant scoped access:

    - **`activity:update`** scope: `PATCH /activities/{slug}`, `POST /notifications`, `GET /activities`, `GET /activities/{slug}`, `GET /auth/me`
    - **`activity:manage`** scope: All of the above, plus `POST /activities`, `DELETE /activities/{slug}`
    - **`widgets`** permission: Unlocks the `/widgets` endpoints (`POST`, `GET`, `GET /{slug}`, `PATCH /{slug}`, `DELETE /{slug}`) for server-driven iOS widget content. Keys without this flag receive 403 on widget endpoints.

    ## Activity State Machine

    Activities follow a state machine with two client-visible states:

    | State | Description |
    |---|---|
    | `ENDED` | Inactive (default on creation) |
    | `ONGOING` | Active Live Activity running on device |

    **Transitions via `PATCH /activities/{slug}`:**

    | From → To | Push Action |
    |---|---|
    | ENDED → ONGOING | Push-to-start (starts Live Activity) |
    | ONGOING → ONGOING | Push update (updates content) |
    | ONGOING → ENDED | Push end (dismisses after 4 hours) |

    ## Countdown Lifecycle

    Countdown activities with `end_date` are automatically managed by the server:

    - **Warning push:** When `warning_threshold` seconds remain, the server sends an update with `accent_color: orange`
    - **Completion push:** When `end_date` is reached, the server ends the activity with `completion_message` (or "Completed") and `progress: 1.0`

    No client action is needed after the initial start -- the server handles the full lifecycle.

    ## Colors

    Templates support optional color fields (`accent_color`, `background_color`, `text_color`):

    - **Named colors:** `red`, `orange`, `yellow`, `green`, `blue`, `purple`, `pink`, `indigo`, `teal`, `cyan`, `mint`, `brown`
    - **Hex RGB:** `#FF5733` or `FF5733`
    - **Hex RGBA:** `#FF573380` or `FF573380`
