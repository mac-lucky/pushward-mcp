          enum:
            - countdown
          type: string
        text_color:
          description: "Text color: named color or hex."
          type: string
        url:
          description: Primary button URL (legacy). Use url_action for richer routing (silent webhook, custom HTTP method/headers/body).
          maxLength: 2048
