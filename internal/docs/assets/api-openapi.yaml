    CreateActivityRequest:
      additionalProperties: false
      properties:
        ended_ttl:
          description: Seconds after ENDED before auto-delete (1s to 30 days)
          format: int64
          maximum: 2592000
          minimum: 1
          type: integer
        name:
          description: Human-readable activity name
          maxLength: 256
          minLength: 1
          type: string
        priority:
          description: Eviction priority (0=lowest, 10=highest, default 0)
          format: int64
          maximum: 10
          minimum: 0
          type: integer
        slug:
          description: Unique activity identifier (alphanumeric, hyphens, underscores)
          maxLength: 128
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9_-]{0,127}$
          type: string
        stale_ttl:
          description: Seconds of inactivity before auto-ending (1s to 30 days)
          format: int64
          maximum: 2592000
          minimum: 1
          type: integer
      required:
        - slug
        - name
      type: object
    CreateIntegrationKeyInputBody:
      additionalProperties: false
      properties:
        activity_slugs:
          description: Restrict key to specific activity slugs or patterns (trailing *)
          items:
            type: string
          type:
            - array
            - "null"
        name:
          description: Human-readable name for the integration key
          maxLength: 256
          minLength: 1
          type: string
        notifications:
          description: "Allow this key to create notifications (default: false)"
          type: boolean
        scope:
          description: "Permission scope (default: activity:update)"
          enum:
            - activity:update
            - activity:manage
          type: string
        widgets:
          description: "Allow this key to manage widgets (default: false)"
          type: boolean
      required:
        - name
      type: object
    CreateNotificationRequest:
      additionalProperties: false
      properties:
        actions:
          description: Server-driven action buttons. Max 10 (Apple cap).
          items:
            $ref: "#/components/schemas/NotificationAction"
          maxItems: 10
          type:
            - array
            - "null"
        activity_slug:
          type: string
        body:
          description: Notification body
          maxLength: 4096
          minLength: 1
          type: string
        collapse_id:
          description: Collapse ID for replacing notifications
          maxLength: 64
          type: string
        icon_url:
          description: http or https URL for per-notification source avatar, shown as the Communication Notification avatar on iOS. Recommended ≤256×256 and ≤100 KB; responses larger than 512 KB are rejected by the iOS extension to protect the 24 MB memory budget.
          maxLength: 2048
          type: string
        level:
          description: "Interruption level (default: active)"
          enum:
            - passive
            - active
            - time-sensitive
            - critical
          type: string
        media:
          $ref: "#/components/schemas/MediaAttachment"
          description: Rich media attachment (image, video, or audio). HTTPS only.
        metadata:
          additionalProperties:
            type: string
          type: object
        push:
          default: true
          description: Send as an APNs push to the user's devices. Defaults to true; set false to store in the inbox only.
          type: boolean
        source:
          description: Source identifier
          maxLength: 128
          type: string
        source_display_name:
          description: Human-readable source name
          maxLength: 256
          type: string
        subtitle:
          description: Notification subtitle
          maxLength: 256
          type: string
        thread_id:
          description: Thread identifier for grouping
          maxLength: 128
          type: string
        title:
          description: Notification title
          maxLength: 256
          minLength: 1
          type: string
        url:
          description: Action URL
          maxLength: 2048
          type: string
        volume:
          description: Volume for critical alerts (0.0-1.0)
          format: double
          maximum: 1
          minimum: 0
          type: number
      required:
        - title
        - body
      type: object
