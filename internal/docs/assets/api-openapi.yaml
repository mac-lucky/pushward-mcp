          type: object
        warning_pushed:
          description: Server-set flag indicating a countdown warning push has been sent.
          readOnly: true
          type: boolean
        warning_threshold:
          description: Seconds before end_date when accent color turns orange and a warning push is sent. Once set, persists across updates until explicitly cleared with null.
          minimum: 0
          type: integer
      required:
