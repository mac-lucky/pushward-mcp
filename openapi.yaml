    UnreadCountOutputBody:
      additionalProperties: false
      properties:
        count:
          format: int64
          type: integer
      required:
        - count
      type: object
    UpdateActivityRequest:
      additionalProperties: false
      properties:
        content:
          $ref: "#/components/schemas/Content"
        priority:
          format: int64
          type: integer
        state:
          enum:
            - ONGOING
            - ENDED
          type: string
      required:
        - state
        - content
      type: object
    UpdateIntegrationKeyInputBody:
      additionalProperties: false
      properties:
        activity_slugs:
          items:
            type: string
