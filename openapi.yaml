        - id
        - title
      type: object
    Problem:
      additionalProperties: false
      properties:
        code:
          description: Stable programmatic identifier for the error. Preferred over pattern-matching on detail.
          examples:
            - activity.limit_exceeded
          type: string
        detail:
          description: A human-readable explanation specific to this occurrence of the problem.
          examples:
            - Activity slug must be unique.
          type: string
        errors:
          description: Per-field validation errors, when applicable.
          items:
            $ref: "#/components/schemas/ErrorDetail"
          type:
            - array
            - "null"
