    UpdateNicknameInputBody:
      additionalProperties: false
      properties:
        nickname:
          description: Display name (null or empty to clear)
          maxLength: 50
          type: string
      type: object
    UpdatePushUpdateTokenInputBody:
      additionalProperties: false
      properties:
        push_update_token:
          description: APNs push-update token for sending Live Activity updates
          maxLength: 200
          minLength: 1
          type: string
      required:
        - push_update_token
      type: object
    UpdateShareRoleInputBody:
      additionalProperties: false
      properties:
        role:
          enum:
            - viewer
            - editor
          type: string
      required:
        - role
      type: object
    VerifySubscriptionInputBody:
      additionalProperties: false
      properties:
        signed_transaction:
          description: App Store JWS signed transaction
          maxLength: 16384
          minLength: 1
          type: string
      required:
        - signed_transaction
      type: object
    WebhookInputBody:
      additionalProperties: false
      properties:
        signedPayload:
          description: Apple JWS notification payload
          maxLength: 65536
          minLength: 1
          type: string
      required:
        - signedPayload
      type: object
