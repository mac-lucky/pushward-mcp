          description: Require device unlock before firing
          type: boolean
        body:
          description: HTTP request body for http(s) action URLs. ≤1KB. Ignored for custom-scheme URLs.
          maxLength: 1024
          type: string
        destructive:
          description: Render the action label in red
          type: boolean
        foreground:
          description: Bring the app to the foreground when tapped
          type: boolean
