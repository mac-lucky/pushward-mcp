components:
  schemas:
    Activity:
      additionalProperties: false
      properties:
        channel_id:
          description: "Broadcast push channel ID (iOS 18+). Server-managed: set when activity transitions to ONGOING."
          examples:
            - kWWZ5wJRKkx6ZwLKBjYqow
          readOnly: true
          type: string
        content:
          description: Live Activity content payload. The shape depends on `template` — pick a tab below to see only the fields for that template.
          discriminator:
            mapping:
              alert: "#/components/schemas/ContentAlert"
              countdown: "#/components/schemas/ContentCountdown"
              gauge: "#/components/schemas/ContentGauge"
              generic: "#/components/schemas/ContentGeneric"
              steps: "#/components/schemas/ContentSteps"
              timeline: "#/components/schemas/ContentTimeline"
            propertyName: template
          oneOf:
            - $ref: "#/components/schemas/ContentGeneric"
              title: Generic
            - $ref: "#/components/schemas/ContentCountdown"
              title: Countdown
            - $ref: "#/components/schemas/ContentSteps"
              title: Steps
            - $ref: "#/components/schemas/ContentAlert"
              title: Alert
            - $ref: "#/components/schemas/ContentGauge"
              title: Gauge
            - $ref: "#/components/schemas/ContentTimeline"
              title: Timeline
        created_at:
          description: Timestamp when the activity was created.
          format: date-time
          readOnly: true
          type: string
        delete_at:
          description: Scheduled deletion time (set automatically from ended_ttl)
          format: date-time
          readOnly: true
          type: string
        ended_at:
          description: Set once when state first transitions to ENDED; preserved on later transitions.
          format: date-time
          readOnly: true
          type: string
        ended_ttl:
          description: Seconds after ENDED before auto-delete and iOS lock-screen dismissal (1s to 30 days; iOS caps lock-screen dismissal at 4h)
          examples:
            - 300
          format: int64
          maximum: 2592000
          minimum: 1
          type: integer
        kind:
          description: "Discriminator: 'owned' for activities the caller owns, 'shared' for activities shared with the caller."
          enum:
            - owned
            - shared
          type: string
        name:
          examples:
            - Dishwasher
          maxLength: 256
          type: string
        priority:
          examples:
            - 0
          format: int64
          maximum: 10
          minimum: 0
          type: integer
        slug:
          examples:
            - dishwasher
          maxLength: 128
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9_-]{0,127}$
          type: string
        stale_ttl:
          description: Seconds of inactivity (ONGOING) before auto-end (1s to 30 days)
          examples:
            - 1800
          format: int64
          maximum: 2592000
          minimum: 1
          type: integer
        state:
          description: Current state. PREEMPTED is server-set only — appears when an activity was evicted to make room for a higher-priority one. Clients can only PATCH the state to ONGOING or ENDED.
          enum:
            - ENDED
            - ONGOING
            - PREEMPTED
          examples:
            - ONGOING
          type: string
        updated_at:
          description: Timestamp of the most recent update.
          format: date-time
          readOnly: true
          type: string
      required:
        - kind
        - slug
        - name
        - state
        - priority
        - content
        - created_at
        - updated_at
      type: object
    ContentAlert:
      additionalProperties: true
      description: One-shot alert with a severity level — critical, warning, or info.
      properties:
        accent_color:
          description: "Accent color: named color or hex (#RRGGBB / #RRGGBBAA)."
          type: string
        background_color:
          description: "Background color: named color or hex."
          type: string
        fired_at:
          description: Unix timestamp when the alert fired.
          type: integer
        icon:
          description: "Icon name. SF Symbol (e.g. washer, flame) or Material Design Icon with mdi: prefix (e.g. mdi:thermometer)."
          maxLength: 128
          type: string
        progress:
          description: Progress value [0.0 - 1.0]
          maximum: 1
          minimum: 0
          type: number
        remaining_time:
          description: Remaining time in seconds.
          minimum: 0
          type: integer
        secondary_url:
          description: Secondary button URL (legacy). Use secondary_url_action for richer routing.
          maxLength: 2048
          type: string
        secondary_url_action:
          description: Secondary button. See url_action for semantics.
          properties:
            body:
              description: HTTP request body for silent webhook. ≤1KB. Ignored for custom-scheme URLs.
              maxLength: 1024
              type: string
            foreground:
              description: "For http(s) URLs only: true opens the URL in Safari / in-app browser; false fires the request silently without launching the app (silent webhook). Ignored for custom-scheme URLs."
              type: boolean
            headers:
              additionalProperties:
                type: string
              description: HTTP headers for silent webhook. Total ≤1KB. Ignored for custom-scheme URLs.
              type: object
            icon:
              description: SF Symbol name (e.g. checkmark.circle).
              maxLength: 64
              type: string
            method:
              description: HTTP method for silent webhook (foreground=false). Defaults to GET. Ignored for custom-scheme URLs.
              enum:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - HEAD
              type: string
            title:
              description: Button label shown to the user.
              maxLength: 64
              type: string
            url:
              description: Target URL. Any scheme except javascript/data/file/vbscript. http(s) URLs require a host; custom schemes (e.g. youtube://, homeassistant://) open the matching app.
              maxLength: 2048
              type: string
          required:
            - url
          type: object
        severity:
          description: Alert severity level. Required when template is alert.
          enum:
            - critical
            - warning
            - info
          type: string
        snoozed_until:
          description: Server-set unix timestamp marking the new end_date after the most recent snooze. Non-nil and >= now means the activity is currently snoozed.
          readOnly: true
          type: integer
        state:
          description: Short status text (e.g. Washing, Build Container Image).
          maxLength: 256
          type: string
        subtitle:
          description: Secondary descriptive text (e.g. Layer 150/200, repo / CI/CD).
          maxLength: 256
          type: string
        tap_action:
          description: Widget-wide tap action. When set, overrides the default behavior (opening the PushWard app to the activity detail page). The whole Live Activity becomes tappable as a single target.
          properties:
            body:
              description: HTTP request body for silent webhook. ≤1KB. Ignored for custom-scheme URLs.
              maxLength: 1024
              type: string
            foreground:
              description: "For http(s) URLs only: true opens the URL in Safari / in-app browser; false fires the request silently without launching the app (silent webhook). Ignored for custom-scheme URLs."
              type: boolean
            headers:
              additionalProperties:
                type: string
              description: HTTP headers for silent webhook. Total ≤1KB. Ignored for custom-scheme URLs.
              type: object
            method:
              description: HTTP method for silent webhook (foreground=false). Defaults to GET. Ignored for custom-scheme URLs.
              enum:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - HEAD
              type: string
            url:
              description: Target URL. Any scheme except javascript/data/file/vbscript. http(s) URLs require a host; custom schemes (e.g. youtube://, homeassistant://) open the matching app.
              maxLength: 2048
              type: string
          required:
            - url
          type: object
        template:
          description: Template type that determines the Live Activity layout.
          enum:
            - alert
          type: string
        text_color:
          description: "Text color: named color or hex."
          type: string
        url:
          description: Primary button URL (legacy). Use url_action for richer routing (silent webhook, custom HTTP method/headers/body).
          maxLength: 2048
          type: string
        url_action:
          description: Primary button. Replaces the legacy url string when richer routing semantics (silent webhook, custom HTTP) are needed. When both url and url_action are set, url_action wins on iOS clients that understand it.
          properties:
            body:
              description: HTTP request body for silent webhook. ≤1KB. Ignored for custom-scheme URLs.
              maxLength: 1024
              type: string
            foreground:
              description: "For http(s) URLs only: true opens the URL in Safari / in-app browser; false fires the request silently without launching the app (silent webhook). Ignored for custom-scheme URLs."
              type: boolean
            headers:
              additionalProperties:
                type: string
              description: HTTP headers for silent webhook. Total ≤1KB. Ignored for custom-scheme URLs.
              type: object
            icon:
              description: SF Symbol name (e.g. checkmark.circle).
              maxLength: 64
              type: string
            method:
              description: HTTP method for silent webhook (foreground=false). Defaults to GET. Ignored for custom-scheme URLs.
              enum:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - HEAD
              type: string
            title:
              description: Button label shown to the user.
              maxLength: 64
              type: string
            url:
              description: Target URL. Any scheme except javascript/data/file/vbscript. http(s) URLs require a host; custom schemes (e.g. youtube://, homeassistant://) open the matching app.
              maxLength: 2048
              type: string
          required:
            - url
          type: object
      required:
        - template
      title: Alert
      type: object
    ContentCountdown:
      additionalProperties: true
      description: Countdown timer with start_date/end_date or duration. Server sends a warning push at warning_threshold and an end push when the timer expires.
      properties:
        accent_color:
          description: "Accent color: named color or hex (#RRGGBB / #RRGGBBAA)."
          type: string
        alarm:
          description: "Opt-in: schedule an iOS AlarmKit alarm at end_date. Requires end_date. Once set, persists across partial updates until cleared with alarm:null or a transition to ENDED. iOS 26+ only."
          type: boolean
        background_color:
          description: "Background color: named color or hex."
          type: string
        completion_message:
          description: Text shown when the countdown expires (default Completed).
          maxLength: 512
          type: string
        duration:
          description: Countdown template only. Integer seconds (60) or a duration string ("60s", "5m", "1h30m"). Sets start_date = now and end_date = now + duration. For mid-flight updates that should preserve the original timer, send end_date directly. If both duration and end_date are provided, end_date wins.
          oneOf:
            - minimum: 1
              type: integer
            - pattern: ^(\d+|(\d+[hms])+)$
              type: string
        end_date:
          description: Unix timestamp for countdown end. Required if duration is not set. Wins over duration when both are set — duration is ignored.
          type: integer
        icon:
          description: "Icon name. SF Symbol (e.g. washer, flame) or Material Design Icon with mdi: prefix (e.g. mdi:thermometer)."
