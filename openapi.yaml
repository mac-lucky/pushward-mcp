          description: A URI reference that identifies the specific occurrence of the problem.
          format: uri
          type: string
        retry_after_ms:
          description: Suggested retry delay in milliseconds. Set on 409 demo conflicts and 429 rate limits; mirrors the Retry-After header but with sub-second precision.
          examples:
            - 3000
          format: int64
          type: integer
        status:
          description: HTTP status code for this response.
          examples:
            - 400
          format: int64
          type: integer
        title:
          description: A short, human-readable summary of the problem type.
          examples:
            - Bad Request
          type: string
        type:
          default: about:blank
          description: A URI reference that identifies the problem type. Resolvable to human-readable documentation when possible.
          examples:
            - https://pushward.app/errors/activity-limit-exceeded
          format: uri
          type: string
      type: object
