        label:
          examples:
            - MRR
          maxLength: 32
          type: string
        unit:
          examples:
            - USD
          maxLength: 16
          type: string
        value:
          examples:
            - $8 333
          maxLength: 32
          type: string
      required:
        - label
        - value
      type: object
    TapAction:
      additionalProperties: false
      properties:
        body:
          type: string
        foreground:
          type: boolean
        headers:
          additionalProperties:
            type: string
          type: object
        icon:
          type: string
        method:
          type: string
        title:
          type: string
        url:
          type: string
      required:
        - url
      type: object
    Threshold:
      additionalProperties: false
      properties:
        color:
          type: string
        label:
          type: string
        value:
          format: double
          type: number
      required:
        - value
      type: object
    UpdateActivityRequest:
      additionalProperties: false
      properties:
        content:
          description: Live Activity content payload. The shape depends on `template` — pick a tab below to see only the fields for that template.
          discriminator:
            mapping:
              alert: "#/components/schemas/ContentAlert"
              countdown: "#/components/schemas/ContentCountdown"
              gauge: "#/components/schemas/ContentGauge"
              generic: "#/components/schemas/ContentGeneric"
              steps: "#/components/schemas/ContentSteps"
              timeline: "#/components/schemas/ContentTimeline"
            propertyName: template
          oneOf:
            - $ref: "#/components/schemas/ContentGeneric"
              title: Generic
            - $ref: "#/components/schemas/ContentCountdown"
              title: Countdown
            - $ref: "#/components/schemas/ContentSteps"
              title: Steps
            - $ref: "#/components/schemas/ContentAlert"
              title: Alert
            - $ref: "#/components/schemas/ContentGauge"
              title: Gauge
            - $ref: "#/components/schemas/ContentTimeline"
              title: Timeline
        priority:
          format: int64
          type: integer
        sound:
          description: Optional Live Activity alert sound. 'default' uses the iOS system sound; other values must match a bundled sound.
          enum:
            - default
            - chime
            - alert
            - success
            - warning
            - bell
            - ding
            - buzz
            - notification
          type: string
        state:
          description: Target state. Optional — if omitted, the current stored state is kept. Setting ENDED on an ONGOING activity dismisses the Live Activity.
          enum:
            - ONGOING
            - ENDED
          type: string
      required:
        - content
      type: object
    UpdateWidgetRequest:
      additionalProperties: false
      properties:
        content:
          $ref: "#/components/schemas/WidgetContent"
        name:
          type: string
        push_throttle:
          format: int64
          type: integer
      required:
        - content
      type: object
    User:
      additionalProperties: false
      properties:
        activity_count:
          description: Number of activities owned by the user.
          format: int64
          readOnly: true
          type: integer
        id:
          description: Server-assigned user ID.
          readOnly: true
          type: string
        nickname:
          description: Display name. Set via the iOS app — not writable from integration keys.
          readOnly: true
          type:
            - string
            - "null"
        subscribed:
          description: Whether the user has an active App Store subscription. Required for create/update activity calls.
          readOnly: true
          type: boolean
      required:
        - id
        - nickname
        - activity_count
        - subscribed
      type: object
    Widget:
      additionalProperties: false
      properties:
        content:
          $ref: "#/components/schemas/WidgetContent"
        created_at:
          format: date-time
          readOnly: true
          type: string
        name:
          examples:
            - CPU Load
          maxLength: 256
          type: string
        push_throttle:
          description: Per-widget minimum seconds between pushes (overrides server default coalesce window for this slug).
          format: int64
          maximum: 3600
          minimum: 1
          type: integer
        slug:
          examples:
            - cpu-load
          maxLength: 128
          minLength: 1
          pattern: ^[a-zA-Z0-9][a-zA-Z0-9_-]{0,127}$
          type: string
        updated_at:
          format: date-time
          readOnly: true
          type: string
      required:
        - slug
        - name
        - content
        - created_at
        - updated_at
      type: object
    WidgetContent:
      additionalProperties: false
      properties:
        accent_color:
          type: string
        background_color:
          type: string
        icon:
          type: string
        label:
          type: string
        max_value:
          format: double
          type: number
        min_value:
          format: double
          type: number
        secondary_url_action:
          $ref: "#/components/schemas/TapAction"
        severity:
          type: string
        stat_rows:
          items:
            $ref: "#/components/schemas/StatRow"
          type:
            - array
            - "null"
        subtitle:
          type: string
        tap_action:
          $ref: "#/components/schemas/TapAction"
        template:
          description: Visual style of the widget.
          enum:
            - value
            - progress
            - status
            - gauge
            - stat_list
          examples:
            - progress
          type: string
        text_color:
          type: string
        trend:
          enum:
            - up
            - down
            - flat
          examples:
            - up
          type: string
        unit:
          type: string
        url_action:
          $ref: "#/components/schemas/TapAction"
        value:
          format: double
          type: number
      required:
        - template
      type: object
  securitySchemes:
    bearer:
      bearerFormat: token
      description: Integration key (hlk_ prefix)
      scheme: bearer
      type: http
info:
  description: |
    PushWard is an APNs gateway for iOS Live Activities.
    Start, update, and end Live Activities on any subscribed device with plain HTTP requests.

    ## Authentication

    All endpoints (except `/health`) require an integration key in the `Authorization` header:

    ```
    Authorization: Bearer hlk_aBcDeFgHiJkLmNoPqRsTuVwXyZ012345
    ```

    Integration keys are created in the PushWard iOS app and grant scoped access:

    - **`activity:update`** scope: `PATCH /activities/{slug}`, `POST /notifications`, `GET /activities`, `GET /activities/{slug}`, `GET /auth/me`
    - **`activity:manage`** scope: All of the above, plus `POST /activities`, `DELETE /activities/{slug}`
    - **`widgets`** permission: Unlocks the `/widgets` endpoints (`POST`, `GET`, `GET /{slug}`, `PATCH /{slug}`, `DELETE /{slug}`) for server-driven iOS widget content. Keys without this flag receive 403 on widget endpoints.

    ## Activity State Machine

    Activities follow a state machine with two client-visible states:

    | State | Description |
    |---|---|
    | `ENDED` | Inactive (default on creation) |
    | `ONGOING` | Active Live Activity running on device |

    **Transitions via `PATCH /activities/{slug}`:**

    | From → To | Push Action |
    |---|---|
    | ENDED → ONGOING | Push-to-start (starts Live Activity) |
    | ONGOING → ONGOING | Push update (updates content) |
    | ONGOING → ENDED | Push end (dismisses after 4 hours) |

    ## Countdown Lifecycle

    Countdown activities with `end_date` are automatically managed by the server:

    - **Warning push:** When `warning_threshold` seconds remain, the server sends an update with `accent_color: orange`
    - **Completion push:** When `end_date` is reached, the server ends the activity with `completion_message` (or "Completed") and `progress: 1.0`

    No client action is needed after the initial start -- the server handles the full lifecycle.

    ## Colors

    Templates support optional color fields (`accent_color`, `background_color`, `text_color`):

    - **Named colors:** `red`, `orange`, `yellow`, `green`, `blue`, `purple`, `pink`, `indigo`, `teal`, `cyan`, `mint`, `brown`
    - **Hex RGB:** `#FF5733` or `FF5733`
    - **Hex RGBA:** `#FF573380` or `FF573380`
