info:
  description: |
    PushWard is an APNs gateway for iOS Live Activities.
    Start, update, and end Live Activities on any subscribed device with plain HTTP requests.

    ## Authentication

    All endpoints (except `/health`) require an API token in the `Authorization` header:

    ```
    Authorization: Bearer hla_aBcDeFgHiJkLmNoPqRsTuVwXyZ012345
    ```

    Tokens follow the format `hla_<base62>` (~36 characters). Only the SHA-256 hash is stored server-side.

    **Integration keys** (`hlk_` prefix) can also be used in the `Authorization` header with scoped access:

    - `activity:update` scope: `PATCH /activity/{slug}`, `POST /notifications`, `GET /activities`, `GET /activities/{slug}`, `GET /auth/me`
    - `activity:manage` scope: All of the above, plus `POST /activities`, `DELETE /activities/{slug}`

    All other endpoints require a full-access `hla_` token and return `403` if called with an integration key.

    ## Subscription

    Some endpoints require an active App Store subscription. Requests without a valid subscription receive a `403` with `"active subscription required"`.

    **Subscription required:**
    - `POST /activities` (create activity)
    - `PATCH /activity/{slug}` (update activity)
    - `POST /notifications` (create notification)
    - `POST /integrations/keys` (create integration key)
    - `POST /integrations/keys/{keyID}/roll` (roll integration key)
    - All device subscription routes (`/devices/{deviceID}/subscribe/*`, `/devices/{deviceID}/subscriptions/*`)

    **No subscription required:**
    - `GET /activities`, `GET /activities/{slug}`, `DELETE /activities/{slug}`
    - `GET /notifications`, `GET /notifications/unread-count`
    - `GET /integrations/keys`, `DELETE /integrations/keys/{keyID}`, `PATCH /integrations/keys/{keyID}`
    - Auth, health, device registration, and subscription management endpoints

    ## Activity State Machine

    Activities follow a state machine with three states:

    | State | Description |
    |---|---|
    | `ENDED` | Inactive (default on creation) |
    | `ONGOING` | Active Live Activity running on device |
    | `PREEMPTED` | Server-evicted due to priority limits |

    **Transitions via `PATCH /activity/{slug}`:**

    | From → To | Push Action |
    |---|---|
    | ENDED → ONGOING | Push-to-start (starts Live Activity) |
    | ONGOING → ONGOING | Push update (updates content) |
    | ONGOING → ENDED | Push end (dismisses after 4 hours) |
    | PREEMPTED → ONGOING | Push-to-start (restarts activity) |

    `PREEMPTED` is server-internal and cannot be set via the API.

    ## Priority & Eviction

    When the ONGOING activity limit (default 5) is exceeded, the server evicts the lowest-priority, oldest activity. Evicted activities transition to `PREEMPTED` and can be restarted.

    ## Countdown Lifecycle

    Countdown activities with `end_date` are automatically managed by the server:

    - **Warning push:** When `warning_threshold` seconds remain, the server sends an update with `accent_color: orange`
    - **Completion push:** When `end_date` is reached, the server ends the activity with `completion_message` (or "Completed") and `progress: 1.0`

    No client action is needed after the initial start -- the server handles the full lifecycle.

    ## Colors

    Templates support optional color fields (`accent_color`, `background_color`, `text_color`):

    - **Named colors:** `red`, `orange`, `yellow`, `green`, `blue`, `purple`, `pink`, `indigo`, `teal`, `cyan`, `mint`, `brown`
    - **Hex RGB:** `#FF5733` or `FF5733`
    - **Hex RGBA:** `#FF573380` or `FF573380`
